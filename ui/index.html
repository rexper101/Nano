<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nano — AI Desktop Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:        #04060f;
  --bg2:       #080c1a;
  --panel:     #0a0e1c;
  --border:    #1a2040;
  --border2:   #243060;
  --teal:      #00e5c8;
  --purple:    #9b59ff;
  --pink:      #ff6eb4;
  --blue:      #1a8fff;
  --text:      #ccd8f0;
  --dim:       #4a5878;
  --faint:     #1e2840;
  --mono:      'Share Tech Mono', monospace;
  --head:      'Orbitron', monospace;
  --body:      'Rajdhani', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--body);
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* ── Animated grid bg ── */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(0,229,200,.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,200,.025) 1px, transparent 1px);
  background-size: 36px 36px;
  pointer-events: none; z-index: 0;
  animation: gridPulse 6s ease-in-out infinite;
}
@keyframes gridPulse { 0%,100%{opacity:.5} 50%{opacity:1} }

/* ── Header ── */
header {
  position: relative; z-index: 10;
  background: var(--bg2);
  border-bottom: 1px solid var(--border2);
  display: flex; align-items: center;
  justify-content: space-between;
  padding: 0 20px; height: 52px; flex-shrink: 0;
}
.logo {
  font-family: var(--head);
  font-size: 18px; font-weight: 900;
  color: var(--teal);
  letter-spacing: 6px;
  text-shadow: 0 0 16px rgba(0,229,200,.5);
}
.logo span { color: var(--purple); font-size: 11px; letter-spacing: 2px; margin-left: 10px; }
.header-right { display: flex; align-items: center; gap: 16px; }
.status-pill {
  display: flex; align-items: center; gap: 5px;
  font-family: var(--mono); font-size: 10px; color: var(--dim);
}
.dot { width: 6px; height: 6px; border-radius: 50%; background: #ff4050; }
.dot.on  { background: #00e87a; box-shadow: 0 0 6px #00e87a; }
.dot.warn{ background: #ffb930; box-shadow: 0 0 6px #ffb930; }
.clock { font-family: var(--head); font-size: 11px; color: var(--teal); letter-spacing: 2px; }

/* ── Main layout ── */
main {
  position: relative; z-index: 1;
  display: flex; flex: 1; overflow: hidden;
}

/* ── Avatar sidebar ── */
#avatar-panel {
  width: 260px; flex-shrink: 0;
  background: var(--panel);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  align-items: center; padding: 20px 16px; gap: 14px;
}

/* SVG anime avatar */
#avatar-svg-wrap {
  width: 180px; height: 220px;
  position: relative; cursor: pointer;
}
#avatar-svg-wrap svg { width: 100%; height: 100%; }

/* Emotion ring around avatar */
.avatar-ring {
  position: absolute; inset: -8px; border-radius: 50%;
  border: 2px solid var(--teal);
  animation: ringPulse 3s ease-in-out infinite;
  box-shadow: 0 0 18px rgba(0,229,200,.3);
}
@keyframes ringPulse { 0%,100%{opacity:.6} 50%{opacity:1} }

.emotion-display {
  font-family: var(--mono); font-size: 10px;
  color: var(--teal); letter-spacing: 3px;
  text-align: center;
}

/* Stat bars */
.stat-row { width: 100%; }
.stat-label {
  display: flex; justify-content: space-between;
  font-family: var(--mono); font-size: 9px;
  color: var(--dim); margin-bottom: 3px;
}
.bar-track { height: 3px; background: var(--faint); border-radius: 2px; }
.bar-fill  { height: 100%; border-radius: 2px; transition: width .5s ease; }

/* ── Chat area ── */
#chat-area {
  flex: 1; display: flex; flex-direction: column; overflow: hidden;
}

#messages {
  flex: 1; overflow-y: auto;
  padding: 20px; display: flex; flex-direction: column; gap: 14px;
  scroll-behavior: smooth;
}
#messages::-webkit-scrollbar { width: 3px; }
#messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* Message bubbles */
.msg { display: flex; gap: 10px; align-items: flex-end; animation: msgIn .2s ease-out; }
@keyframes msgIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
.msg.user { flex-direction: row-reverse; }

.msg-icon {
  width: 30px; height: 30px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; flex-shrink: 0;
  border: 1px solid var(--border2); background: var(--panel);
}
.msg.nano .msg-icon { border-color: var(--teal); color: var(--teal);
                      background: rgba(0,229,200,.06); }
.msg.user .msg-icon { border-color: var(--purple); color: var(--purple);
                      background: rgba(155,89,255,.06); }

.bubble {
  max-width: 68%; padding: 10px 14px; border-radius: 4px 12px 12px 12px;
  font-size: 14px; line-height: 1.55; font-weight: 300;
}
.msg.nano .bubble {
  background: rgba(0,229,200,.05);
  border: 1px solid rgba(0,229,200,.15);
}
.msg.user .bubble {
  background: rgba(155,89,255,.07);
  border: 1px solid rgba(155,89,255,.2);
  border-radius: 12px 4px 12px 12px;
}

.msg-meta {
  margin-top: 4px; font-family: var(--mono); font-size: 9px;
  color: var(--dim); display: flex; gap: 8px;
}
.msg.user .msg-meta { justify-content: flex-end; }

.emotion-chip {
  font-family: var(--mono); font-size: 9px; padding: 1px 5px; border-radius: 3px;
  border: 1px solid var(--border);
}
.emotion-chip.happy   { color:#00e87a; border-color:#00e87a; }
.emotion-chip.thinking{ color:#ffb930; border-color:#ffb930; }
.emotion-chip.error   { color:#ff4050; border-color:#ff4050; }
.emotion-chip.neutral,
.emotion-chip.idle    { color:var(--dim); border-color:var(--border2); }

/* Action bubble */
.action-box {
  margin-top: 8px; background: var(--faint);
  border: 1px solid var(--border);
  border-left: 3px solid var(--purple);
  border-radius: 4px; padding: 8px 10px;
  font-family: var(--mono); font-size: 11px; color: var(--purple);
}

/* Thinking dots */
.thinking-dots { display: flex; gap: 4px; padding: 4px 0; }
.thinking-dots span {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--teal); opacity: .3;
  animation: dotPulse 1.2s ease-in-out infinite;
}
.thinking-dots span:nth-child(2){animation-delay:.2s}
.thinking-dots span:nth-child(3){animation-delay:.4s}
@keyframes dotPulse{0%,80%,100%{opacity:.3}40%{opacity:1}}

/* ── Input bar ── */
#input-bar {
  padding: 14px 20px; background: var(--panel);
  border-top: 1px solid var(--border);
  display: flex; gap: 10px; align-items: center; flex-shrink: 0;
}
#text-in {
  flex: 1; background: var(--bg2);
  border: 1px solid var(--border2); border-radius: 6px;
  color: var(--text); font-family: var(--mono); font-size: 13px;
  padding: 10px 14px; outline: none; resize: none;
  height: 42px; transition: border-color .2s;
}
#text-in:focus { border-color: var(--teal); box-shadow: 0 0 0 2px rgba(0,229,200,.08); }
#text-in::placeholder { color: var(--dim); }

.btn {
  width: 42px; height: 42px; border-radius: 6px;
  border: 1px solid var(--border2); background: var(--bg2);
  color: var(--dim); cursor: pointer; font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s; flex-shrink: 0;
}
.btn:hover        { border-color:var(--teal); color:var(--teal); }
.btn.active       { background:rgba(0,229,200,.1); border-color:var(--teal); color:var(--teal); }
.btn.send         { border-color:var(--teal); color:var(--teal); background:rgba(0,229,200,.08);}
.btn.send:hover   { background:var(--teal); color:var(--bg); }

/* ── Right info panel ── */
#right-panel {
  width: 230px; flex-shrink: 0;
  background: var(--panel);
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column; gap: 1px; overflow: hidden;
}
.rp-section { padding: 14px; border-bottom: 1px solid var(--border); }
.rp-section.fill { flex:1; overflow-y:auto; }
.rp-title {
  font-family: var(--head); font-size: 8px; letter-spacing: 3px;
  color: var(--dim); margin-bottom: 8px; text-transform: uppercase;
}
.intent-grid { display: flex; flex-wrap: wrap; gap: 4px; }
.intent-tag {
  padding: 2px 7px; border-radius: 10px; font-family: var(--mono); font-size: 9px;
  background: var(--faint); border: 1px solid var(--border); color: var(--dim);
  cursor: default; transition: all .15s;
}
.intent-tag.active { color:var(--teal); border-color:var(--teal); background:rgba(0,229,200,.06); }

.cmd-item {
  font-family: var(--mono); font-size: 10px; padding: 4px 0;
  border-bottom: 1px solid var(--faint); color: var(--text); cursor: pointer;
}
.cmd-item:hover { color: var(--teal); }
.cmd-item:last-child { border: none; }
.cmd-item .cmd-key { color: var(--purple); margin-right: 4px; }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">NANO <span>AI DESKTOP ASSISTANT</span></div>
  <div class="header-right">
    <div class="status-pill"><div class="dot warn" id="d-ollama"></div>OLLAMA</div>
    <div class="status-pill"><div class="dot" id="d-avatar"></div>AVATAR</div>
    <div class="status-pill"><div class="dot" id="d-ws"></div>API</div>
    <div class="clock" id="clk">--:--:--</div>
  </div>
</header>

<main>

<!-- AVATAR PANEL -->
<div id="avatar-panel">

  <!-- SVG Anime Girl Avatar -->
  <div id="avatar-svg-wrap" onclick="sendMsg('Hello Nano! Tell me what you can do.')">
    <div class="avatar-ring" id="av-ring"></div>
    <svg viewBox="0 0 180 220" xmlns="http://www.w3.org/2000/svg" id="av-svg">
      <!-- Aura glow -->
      <ellipse cx="90" cy="110" rx="78" ry="90" fill="none" stroke="#00e5c8" stroke-width="1" opacity=".3"/>
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Nano — JARVIS Interface</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto+Mono:wght@300;500&display=swap" rel="stylesheet">
    <style>
      :root{--bg:#020305;--panel:#06101a;--accent:#00f0c8;--accent2:#5b7dff;--dim:#4b5a78;--glass:rgba(255,255,255,0.03);--mono:'Roboto Mono', monospace}
      *{box-sizing:border-box;margin:0;padding:0}
      html,body{height:100%;background:radial-gradient(ellipse at 20% 10%,#06202b 0%, transparent 40%),var(--bg);font-family:var(--mono);color:#dcecff}
      .wrap{display:grid;grid-template-columns:320px 1fr 300px;grid-template-rows:72px 1fr 88px;height:100vh;gap:12px;padding:14px}

      /* Header */
      .hdr{grid-column:1/-1;background:linear-gradient(90deg,#02101844,#03102a44);border:1px solid rgba(255,255,255,0.03);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:space-between;padding:12px 18px;border-radius:8px}
      .brand{display:flex;align-items:center;gap:12px}
      .brand .logo{font-family:Orbitron,monospace;color:var(--accent);font-weight:900;letter-spacing:6px}
      .brand .sub{font-size:11px;color:var(--dim)}
      .status{display:flex;gap:12px;align-items:center}
      .dot{width:10px;height:10px;border-radius:50%;background:#2b2f3a;box-shadow:0 0 10px rgba(0,0,0,.6)}
      .dot.on{background:var(--accent);box-shadow:0 0 14px var(--accent)}
      .dot.warn{background:#ffb84d;box-shadow:0 0 12px #ffb84d}
      .clock{font-family:Orbitron;font-size:13px;color:var(--accent2)}

      /* Left panel - systems */
      .left{background:linear-gradient(180deg,#04121a88,#03122388);border-radius:10px;padding:18px;border:1px solid rgba(255,255,255,0.03)}
      .left h3{font-size:12px;color:var(--dim);letter-spacing:2px;margin-bottom:12px}
      .sys-list{display:flex;flex-direction:column;gap:10px}
      .sys{display:flex;align-items:center;gap:10px}
      .sys .name{flex:1;color:#cfeef3}
      .meter{height:8px;background:rgba(255,255,255,0.04);border-radius:6px;overflow:hidden}
      .meter > i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));width:40%}

      /* Center - hologram & messages */
      .center{display:flex;flex-direction:column;gap:10px}
      .holo{height:260px;border-radius:12px;background:linear-gradient(180deg,rgba(11,22,28,0.35),rgba(3,6,10,0.2));border:1px solid rgba(255,255,255,0.025);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
      .holo .ring{position:absolute;border-radius:50%;width:360px;height:360px;left:50%;top:40%;transform:translate(-50%,-50%);background:conic-gradient(from 120deg,var(--accent)22%,transparent 22%);opacity:.06;filter:blur(16px)}
      .holo .core{width:220px;height:220px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 30% 30%,#052733,transparent 40%);box-shadow:0 0 60px rgba(0,240,200,0.06)}
      .holo .core .txt{font-family:Orbitron;font-size:18px;color:var(--accent);letter-spacing:6px}

      .messages{background:linear-gradient(180deg,rgba(255,255,255,0.02),transparent);border-radius:10px;padding:14px;flex:1;overflow:auto;border:1px solid rgba(255,255,255,0.02)}
      .msg{display:flex;gap:12px;align-items:flex-start;margin-bottom:12px}
      .msg.mine{flex-direction:row-reverse}
      .bubble{max-width:78%;padding:10px 14px;border-radius:8px;background:#021827;color:#dff6ef}
      .bubble.self{background:linear-gradient(90deg,#2a2f44,#172034);color:#d7dff6}
      .meta{font-size:11px;color:var(--dim);margin-top:6px}

      /* Right panel */
      .right{background:linear-gradient(180deg,#03131a66,#02121a66);border-radius:10px;padding:18px;border:1px solid rgba(255,255,255,0.03);display:flex;flex-direction:column}
      .right h3{font-size:12px;color:var(--dim);letter-spacing:2px;margin-bottom:10px}
      .quick{display:flex;flex-direction:column;gap:8px}
      .quick button{background:transparent;border:1px solid rgba(255,255,255,0.03);color:#bfeee0;padding:8px;border-radius:8px;text-align:left;cursor:pointer}

      /* Footer input */
      .footer{grid-column:1/-1;display:flex;gap:12px;align-items:center}
      .input{flex:1;background:linear-gradient(90deg,#021020,#031224);padding:10px;border-radius:10px;border:1px solid rgba(255,255,255,0.03);display:flex;gap:8px}
      .input textarea{flex:1;background:transparent;border:none;color:#dfeffd;outline:none;resize:none;height:56px;font-family:var(--mono);padding:6px}
      .controls{display:flex;gap:8px}
      .btn{background:linear-gradient(180deg,var(--accent),var(--accent2));border:none;color:#021018;padding:10px 14px;border-radius:8px;cursor:pointer}

      /* small responsive */
      @media(max-width:980px){.wrap{grid-template-columns:1fr;grid-template-rows:72px auto 1fr 88px}.left,.right{display:none}}
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="hdr">
        <div class="brand"><div class="logo">NANO</div><div class="sub">JARVIS MODE</div></div>
        <div class="status">
          <div style="display:flex;gap:8px;align-items:center"><div id="d-ollama" class="dot"></div><div style="font-size:12px;color:var(--dim)">OLLAMA</div></div>
          <div style="display:flex;gap:8px;align-items:center"><div id="d-ws" class="dot"></div><div style="font-size:12px;color:var(--dim)">API</div></div>
          <div class="clock" id="clk">--:--:--</div>
        </div>
      </div>

      <div class="left">
        <h3>SYSTEMS</h3>
        <div class="sys-list">
          <div class="sys"><div class="name">LLM</div><div class="meter"><i style="width:72%"></i></div></div>
          <div class="sys"><div class="name">TTS</div><div class="meter"><i style="width:60%"></i></div></div>
          <div class="sys"><div class="name">STT</div><div class="meter"><i style="width:48%"></i></div></div>
          <div class="sys"><div class="name">MEMORY</div><div class="meter"><i id="mem-bar" style="width:18%"></i></div></div>
        </div>
      </div>

      <div class="center">
        <div class="holo" id="holo">
          <div class="ring"></div>
          <div class="core"><div class="txt">NANO</div></div>
        </div>

        <div class="messages" id="messages">
          <div class="msg nano"><div style="width:42px;height:42px;border-radius:50%;background:linear-gradient(90deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center">N</div>
            <div style="flex:1">
              <div class="bubble">Konnichiwa! Nano online. Ask me anything.</div>
              <div class="meta">NANO • boot</div>
            </div>
          </div>
        </div>
      </div>

      <div class="right">
        <h3>QUICK ACTIONS</h3>
        <div class="quick">
          <button onclick="sendMsg('write a Flask web app with login')">Write Flask app</button>
          <button onclick="sendMsg('run ipconfig')">Run ipconfig</button>
          <button onclick="sendMsg('what is on my screen')">Read screen</button>
          <button onclick="sendMsg('what do you remember about me')">Show memory</button>
        </div>
      </div>

      <div class="footer">
        <div class="input">
          <textarea id="text-in" placeholder="Command or question…" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}" oninput="autoH(this)"></textarea>
          <div class="controls">
            <button id="btn-mic" class="btn" onclick="toggleMic()">🎙</button>
            <button class="btn" onclick="sendMsg()">SEND</button>
          </div>
        </div>
      </div>
    </div>

    <script>
      const API = 'http://localhost:8000';
      let ws = null, turns = 0;

      // Clock
      setInterval(()=>document.getElementById('clk').textContent=new Date().toTimeString().slice(0,8),1000);

      // Helpers
      function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
      function now(){return new Date().toTimeString().slice(0,8)}
      function append(html){const m=document.getElementById('messages');m.insertAdjacentHTML('beforeend',html);m.scrollTop=99999}

      // Connection indicators
      function dot(id,on){const el=document.getElementById('d-'+id); if(!el) return; el.className='dot'+(on?' on':'')}

      // WebSocket
      function connectWS(){try{ws=new WebSocket('ws://localhost:8000/ws');ws.onopen=()=>{dot('ws',true);console.log('WS open')};ws.onclose=()=>{dot('ws',false);setTimeout(connectWS,2500)};ws.onmessage=e=>handleWS(JSON.parse(e.data))}catch(e){dot('ws',false)}}
      function handleWS(d){if(d.type==='thinking'){showThinking();return} if(d.type==='response'){removeThinking(); addNanoMsg(d)}}

      // Send message
      async function sendMsg(text){const inp=document.getElementById('text-in');const t=text||inp.value.trim(); if(!t) return; inp.value=''; autoH(inp); addUserMsg(t); if(ws && ws.readyState===WebSocket.OPEN){ws.send(JSON.stringify({text:t,session_id:'ui'})); showThinking(); return;} showThinking(); try{const t0=Date.now(); const r=await fetch(API+'/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:t,session_id:'ui'})}); const data=await r.json(); data.latency_ms=Date.now()-t0; removeThinking(); addNanoMsg(data);}catch(e){removeThinking(); addNanoMsg({response:'Backend not reachable. Start Nano first: python main.py --text', emotion:'error'})}}

      function addUserMsg(text){turns++; append(`<div class="msg mine"><div style="width:42px;height:42px;border-radius:50%;background:#2a2f44;display:flex;align-items:center;justify-content:center">U</div><div style="flex:1"><div class="bubble self">${esc(text)}</div><div class="meta">YOU • ${now()}</div></div></div>`)}

      function addNanoMsg(data){const resp=data.response||''; const emo=data.emotion||'idle'; const lat=data.latency_ms||0; append(`<div class="msg"><div style="width:42px;height:42px;border-radius:50%;background:linear-gradient(90deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center">N</div><div style="flex:1"><div class="bubble">${esc(resp)}</div><div class="meta">NANO • ${lat?lat+'ms • ':''}${now()}</div></div></div>`); dot('ollama', data.ollama||false); document.getElementById('mem-bar').style.width=(data.mem_percent||18)+'%'; setTimeout(()=>{},1200)}

      let thinkEl=null; function showThinking(){if(thinkEl) return; thinkEl=document.createElement('div');thinkEl.className='msg'; thinkEl.innerHTML=`<div style="width:42px;height:42px;border-radius:50%;background:#16303a;display:flex;align-items:center;justify-content:center">N</div><div style="flex:1"><div class="bubble">... thinking</div></div>`; document.getElementById('messages').appendChild(thinkEl); document.getElementById('messages').scrollTop=99999}
      function removeThinking(){if(thinkEl){thinkEl.remove();thinkEl=null}}

      // Health poll
      async function health(){try{const r=await fetch(API+'/health',{signal:AbortSignal.timeout(3000)}); const d=await r.json(); dot('ollama', d.ollama); dot('ws', true);}catch(e){dot('ollama',false); dot('ws',false)}}

      // Mic (browser SR)
      let mic=null; function toggleMic(){const btn=document.getElementById('btn-mic'); if(mic){mic=null; btn.style.opacity=1; return;} const SR=window.SpeechRecognition||window.webkitSpeechRecognition; if(!SR){alert('Voice not supported');return} mic=new SR(); mic.continuous=false; mic.lang='en-US'; mic.onstart=()=>{btn.style.opacity=.6}; mic.onresult=e=>{document.getElementById('text-in').value=e.results[0][0].transcript; mic=null; btn.style.opacity=1; setTimeout(()=>sendMsg(),150)}; mic.onerror=()=>{mic=null;btn.style.opacity=1}; mic.start()}

      function autoH(el){el.style.height='56px'; el.style.height=Math.min(el.scrollHeight,160)+'px'}

      // Init
      connectWS(); health(); setInterval(health,30000);
    </script>
